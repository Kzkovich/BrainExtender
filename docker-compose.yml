services:
  bot:
    build: .
    container_name: brain-bot
    restart: unless-stopped
    command: python3 bot/main.py
    env_file: .env
    volumes:
      - /srv/brain:/app/data
      - ./profiles:/app/profiles:ro
      - ./templates:/app/templates:ro
    depends_on:
      - api
    networks:
      - brain

  api:
    build: .
    container_name: brain-api
    restart: unless-stopped
    command: python3 -m uvicorn api.main:app --host 0.0.0.0 --port 8001
    env_file: .env
    volumes:
      - /srv/brain:/app/data
      - ./profiles:/app/profiles:ro
      - ./templates:/app/templates:ro
    ports:
      - "127.0.0.1:8001:8001"   # Only localhost — nginx proxies externally
    networks:
      - brain

networks:
  brain:
    driver: bridge
