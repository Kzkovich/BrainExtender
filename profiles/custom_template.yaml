    name: "Заметка"
    template_path: "templates/universal_note.md"
    note_mode: structured

  - id: personal_note
    name: "Личная заметка"
    template_path: "templates/universal_note.md"
    note_mode: personal

  # Добавь свои типы по образцу:
  # - id: my_type
  #   name: "Мой тип"
